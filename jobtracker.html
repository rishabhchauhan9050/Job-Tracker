<body>
   <div class="header"> <h1>Job Application Tracker</h1></div>
    <div class="main-div"> <h2>Add New Application</h2>
       
            <div class="bb"><input type="text" id="company" placeholder="Company Name">
        <input type="text" id="role" placeholder="Job Role">
        <input type="date" id="date" placeholder="Date Applied">
        <select name="" id="status">

              <option value="">Status</option>
            <option value="Applied">Applied</option>
            <option value="Interview">Interview</option>
            <option value="Rejected">Rejected</option>
            <option value="Offer">Offer</option>
        </select>
        <button class="btn" id="addBtn" >Add Application</button></div>
<h2>Applications</h2>
<div class="data"><table>
<thead>
<tr>
<th>Company</th>
<th>Role</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="job-list">
</tbody>
</table></div>

    <script>
        document.getElementById("addBtn").addEventListener("click", function(){

let company = document.getElementById("company").value;
let role = document.getElementById("role").value;
let date = document.getElementById("date").value;
let status = document.getElementById("status").value;

let table = document.getElementById("job-list");

let row = table.insertRow();

row.insertCell(0).innerText = company;
row.insertCell(1).innerText = role;
row.insertCell(2).innerText = date;
row.insertCell(3).innerText = status;

let actionCell = row.insertCell(4);
actionCell.innerHTML = `
<button onclick="editRow(this)">Edit</button>
<button onclick="deleteRow(this)">Delete</button>
`;
});
function editRow(btn){
let row = btn.parentNode.parentNode;

let company = row.cells[0].innerText;
let role = row.cells[1].innerText;
let date = row.cells[2].innerText;
let status = row.cells[3].innerText;

document.getElementById("company").value = company;
document.getElementById("role").value = role;
document.getElementById("date").value = date;
document.getElementById("status").value = status;

row.remove();
}
function deleteRow(btn){
let row = btn.parentNode.parentNode;
row.remove();
}
    </script>
    
</body>
